[project]
name = "ai-meeting-assistant"

[[services]]
name = "backend"
path = "backend"
start = "uvicorn main:app --host 0.0.0.0 --port $PORT"
build = "pip install -r requirements.txt"
env = { OPENAI_API_KEY = "" }

[[services]]
name = "frontend"
path = "frontend"
start = "npx serve -s dist --listen 0.0.0.0:$PORT"
build = "npm install && npm run build"
env = { VITE_BACKEND_URL = "" }
